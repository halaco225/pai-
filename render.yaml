databases:
  - name: pai-db
    plan: free
    databaseName: pai
    user: pai

services:
  - type: web
    name: pai-ayvaz
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: pai-db
          property: connectionString
