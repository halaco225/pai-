name: Velocity ODS Daily Pull

on:
  schedule:
    # 5 AM EST (10 AM UTC) every day
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD). Leave blank for yesterday.'
        required: false

jobs:
  pull-ods:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ODS pull
        run: |
          DATE_PARAM=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE_PARAM=", \"date\": \"${{ github.event.inputs.date }}\""
          fi

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.PAI_BASE_URL }}/api/velocity/automation/pull-ods" \
            -H "Content-Type: application/json" \
            -H "X-Automation-Token: ${{ secrets.VELOCITY_AUTOMATION_TOKEN }}" \
            -d "{${DATE_PARAM}}")

          BODY=$(echo "$RESPONSE" | head -n1)
          STATUS=$(echo "$RESPONSE" | tail -n1)

          echo "HTTP $STATUS: $BODY"

          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "Error: non-2xx response from PAi"
            exit 1
          fi
